<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Armenian Number Crossword</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }
        h2 { color: #333; margin: 5px 0 15px 0; }
        
        /* 20x20 Responsive Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 1px;
            background-color: #000;
            border: 1px solid #000;
            width: 100%;
            max-width: 500px; /* Keeps it from getting too big on tablets */
            margin-bottom: 15px;
        }
        .cell {
            aspect-ratio: 1 / 1; /* Keeps the cells perfectly square */
            background-color: #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5vw; /* Scales text to screen size */
            font-weight: bold;
            cursor: pointer;
        }
        @media (min-width: 500px) {
            .cell { font-size: 16px; }
            .cell .number { font-size: 9px; }
        }
        .cell.black { background-color: #333; cursor: default; }
        .cell.selected { background-color: #b2ebf2; }
        .cell .number {
            position: absolute;
            top: 1px;
            left: 1px;
            font-size: 2vw; /* Scales number to screen size */
            color: #666;
        }
        .cell.correct { color: green; }
        .cell.incorrect { color: red; }
        
        /* Keyboard */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            width: 100%;
            max-width: 500px;
        }
        .key {
            flex: 1 1 10%;
            padding: 8px 0;
            font-size: 16px;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
        }
        .key:active { background-color: #bdbdbd; }
        
        #controls {
            margin-top: 15px;
            text-align: center;
            height: 40px;
        }
        #next-btn {
            display: none;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 id="level-title">Խաչբառ - Level 1</h2>
    
    <div class="grid" id="grid"></div>
    
    <div class="keyboard" id="keyboard"></div>

    <div id="controls">
        <div id="message"></div>
        <button id="next-btn" onclick="nextLevel()">Հաջորդ մակարդակ (Next Level) ➡️</button>
    </div>

    <script>
        const alphabet = "ԱԲԳԴԵԶԷԸԹԺԻԼԽԾԿՀՁՂՃՄՅՆՇՈՉՊՋՌՍՎՏՐՑՈՒՓՔՕՖ".split('');
        let currentLevelIndex = 1;
        let selectedCell = null;
        let activeMapping = {};

        // Helper: Creates a basic 20x20 grid layout with letters
        // (0 means a black block, letters are the hidden answers)
        function generateGridShape() {
            let grid = Array(20).fill(null).map(() => Array(20).fill('0'));
            
            // Placing a few sample intersecting words in the 20x20 space
            // In a real app, you would have hundreds of these predefined shapes
            let words = [
                { row: 2, col: 2, dir: 'H', text: "ԲԱՐԵՎ" },
                { row: 2, col: 4, dir: 'V', text: "ՐՈՊԵ" },
                { row: 5, col: 4, dir: 'H', text: "ԵՐԵՎԱՆ" },
                { row: 3, col: 8, dir: 'V', text: "ՀԱՅԱՍՏԱՆ" }
            ];

            words.forEach(w => {
                for(let i=0; i<w.text.length; i++) {
                    let r = w.dir === 'H' ? w.row : w.row + i;
                    let c = w.dir === 'H' ? w.col + i : w.col;
                    grid[r][c] = w.text[i];
                }
            });
            return grid;
        }

        // Randomly maps numbers 1-39 to the Armenian alphabet
        function createRandomMapping() {
            let numbers = Array.from({length: 39}, (_, i) => i + 1);
            numbers.sort(() => Math.random() - 0.5); // Shuffle numbers
            
            let map = {};
            let reverseMap = {};
            alphabet.forEach((letter, i) => {
                map[numbers[i]] = letter;
                reverseMap[letter] = numbers[i];
            });
            return { map, reverseMap };
        }

        function loadLevel() {
            document.getElementById('level-title').innerText = "Խաչբառ - Level " + currentLevelIndex;
            document.getElementById('message').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            selectedCell = null;

            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            
            const gridShape = generateGridShape();
            const mappings = createRandomMapping();
            activeMapping = mappings.map;
            const reverseMap = mappings.reverseMap;

            for (let r = 0; r < 20; r++) {
                for (let c = 0; c < 20; c++) {
                    const cellLetter = gridShape[r][c];
                    const cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    
                    if (cellLetter === '0') {
                        cellDiv.classList.add('black');
                    } else {
                        // Look up the random number for this letter
                        const num = reverseMap[cellLetter];

                        const numSpan = document.createElement('span');
                        numSpan.classList.add('number');
                        numSpan.innerText = num;
                        cellDiv.appendChild(numSpan);
                        
                        const letterSpan = document.createElement('span');
                        letterSpan.classList.add('letter');
                        cellDiv.appendChild(letterSpan);

                        cellDiv.dataset.expected = cellLetter;
                        cellDiv.onclick = () => selectCell(cellDiv);
                    }
                    gridContainer.appendChild(cellDiv);
                }
            }
            buildKeyboard();
        }

        function buildKeyboard() {
            const kbContainer = document.getElementById('keyboard');
            kbContainer.innerHTML = '';
            alphabet.forEach(letter => {
                const btn = document.createElement('div');
                btn.classList.add('key');
                btn.innerText = letter;
                btn.onclick = () => typeLetter(letter);
                kbContainer.appendChild(btn);
            });
        }

        function selectCell(cellDiv) {
            if (selectedCell) selectedCell.classList.remove('selected');
            selectedCell = cellDiv;
            selectedCell.classList.add('selected');
        }

        function typeLetter(letter) {
            if (!selectedCell) return;
            const letterSpan = selectedCell.querySelector('.letter');
            letterSpan.innerText = letter;
            
            if (letter === selectedCell.dataset.expected) {
                selectedCell.classList.remove('incorrect');
                selectedCell.classList.add('correct');
            } else {
                selectedCell.classList.remove('correct');
                selectedCell.classList.add('incorrect');
            }
            checkWin();
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell:not(.black)');
            let allCorrect = true;
            let completelyFilled = true;

            cells.forEach(cell => {
                const letter = cell.querySelector('.letter').innerText;
                if (!letter) completelyFilled = false;
                if (!cell.classList.contains('correct')) allCorrect = false;
            });

            if (allCorrect && completelyFilled) {
                document.getElementById('next-btn').style.display = "inline-block";
            }
        }

        function nextLevel() {
            currentLevelIndex++;
            loadLevel();
        }

        // Start the game
        loadLevel();
    </script>
</body>
</html>
